<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>魚魚副食品食材配對工具 🐟</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');
:root{--cream:#faf7f0;--warm:#fff9f2;--gold:#c8934a;--gold-l:#f5e6cc;--dk:#4a3120;--mid:#7a5c3e;--lt:#b89070;--sage:#7a9e7e;--peach:#f0a070;--border:#e8d8c0;--r:14px;--shadow:0 4px 20px rgba(74,49,32,0.10);--red:#e05050;--orange:#f0a030;--green:#4caf50}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);color:var(--dk);min-height:100vh}
header{background:var(--warm);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(74,49,32,0.06)}
.hd{display:flex;align-items:center;justify-content:space-between;padding:12px 18px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:26px}.logo-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;color:var(--dk);letter-spacing:1px}
.logo-sub{font-size:11px;color:var(--lt);margin-top:1px}
.save-dot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:background 0.3s;flex-shrink:0}
.save-dot.saved{background:#4caf50}
nav{display:flex;overflow-x:auto;padding:0 12px;scrollbar-width:none}nav::-webkit-scrollbar{display:none}
.nb{flex-shrink:0;background:none;border:none;border-bottom:3px solid transparent;padding:9px 12px;cursor:pointer;font-size:12px;color:var(--lt);font-family:'Noto Sans TC',sans-serif;white-space:nowrap;transition:all 0.2s}
.nb.active{color:var(--dk);border-bottom-color:var(--gold);font-weight:600}
main{padding:16px 14px 80px;max-width:700px;margin:0 auto}
.st{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;color:var(--dk);border-left:4px solid var(--gold);padding-left:12px;margin-bottom:14px}
.ss{font-size:12px;color:var(--lt);margin-bottom:14px;margin-top:-8px;line-height:1.6}
.card{background:var(--warm);border-radius:var(--r);border:1px solid var(--border);padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.day-tabs{display:flex;gap:7px;overflow-x:auto;margin-bottom:14px;scrollbar-width:none;padding-bottom:2px}
.day-tabs::-webkit-scrollbar{display:none}
.db{flex-shrink:0;background:#f0e8d8;border:none;border-radius:20px;padding:6px 14px;cursor:pointer;font-size:13px;color:var(--mid);font-family:'Noto Sans TC',sans-serif;transition:all 0.2s}
.db.active{background:var(--gold);color:#fff;font-weight:600}
.mh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:6px}
.mn-badge{font-size:11px;background:var(--gold);color:#fff;border-radius:10px;padding:3px 9px;margin-right:6px}
.mn-badge.two{background:var(--sage)}
.mname{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;color:var(--dk)}
.mp{font-size:11px;color:var(--mid);background:#f5ede0;border-radius:10px;padding:3px 9px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fi{background:#f9f4ee;border-radius:10px;padding:11px;cursor:pointer;border:2px solid transparent;transition:all 0.2s;user-select:none;-webkit-user-select:none}
.fi:active{transform:scale(0.97)}.fi.eaten{background:#ecf7ec;border-color:var(--sage)}
.frole{font-size:10px;color:var(--lt);margin-bottom:3px}.fname{font-size:14px;font-weight:600;color:var(--dk)}
.fdet{font-size:11px;color:var(--gold);margin-top:2px}.ftex{font-size:10px;color:#aaa;margin-top:2px}
.fnote{font-size:10px;color:var(--lt);margin-top:4px;line-height:1.4}
.fchk{font-size:11px;margin-top:7px;color:#bbb;font-weight:500}.fi.eaten .fchk{color:var(--sage)}
.tip{font-size:12px;color:var(--peach);margin-top:9px;padding:7px 10px;background:#fff8f0;border-radius:8px;line-height:1.5}
textarea{width:100%;min-height:70px;padding:10px;border-radius:10px;border:1px solid var(--border);font-family:'Noto Sans TC',sans-serif;font-size:13px;resize:vertical;background:#fffdf8;color:var(--dk);line-height:1.5}
textarea:focus{outline:none;border-color:var(--gold)}
.tn{font-size:12px;color:var(--lt);margin-bottom:14px;padding:8px 12px;background:#f5ede0;border-radius:8px;line-height:1.6}
.nr{display:flex;align-items:center;gap:9px;margin-bottom:13px}
.nname{width:70px;font-size:12px;font-weight:600;color:var(--dk);flex-shrink:0}
.bw{flex:1;height:13px;background:#e8e0d0;border-radius:7px;overflow:hidden}
.bf{height:100%;border-radius:7px;transition:width 0.6s ease}
.bpct{width:38px;font-size:12px;font-weight:700;text-align:right;flex-shrink:0}
.bst{width:22px;font-size:13px;text-align:right;flex-shrink:0}
.ib{border-radius:var(--r);padding:14px;margin-top:14px}
.ib.warn{background:#fff8f0;border:1px solid #f0d0a0}.ib.ok{background:#f0faf0;border:1px solid #b0d8b0}
.ib.plain{background:#fff;border:1px solid var(--border)}
.it{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;color:var(--dk);margin-bottom:9px}
.ii{font-size:12px;color:var(--mid);margin-bottom:6px;line-height:1.6}
.ftags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.ftag{background:#e8f0e0;color:#4a6e3e;border-radius:12px;padding:3px 9px;font-size:11px}
.nutrient-status-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.ns-chip{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600}
.ns-chip.low{background:#fdecea;color:var(--red)}.ns-chip.mid{background:#fff3e0;color:var(--orange)}.ns-chip.ok{background:#e8f5e9;color:var(--green)}
.food-picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.fp-item{background:#f9f4ee;border-radius:10px;padding:10px 8px;cursor:pointer;border:2px solid transparent;transition:all 0.2s;text-align:center;user-select:none}
.fp-item:active{transform:scale(0.96)}.fp-item.recommended{background:#e8f5e9;border-color:var(--sage)}
.fp-item.selected{background:var(--gold-l);border-color:var(--gold)}
.fp-emoji{font-size:22px;margin-bottom:4px}.fp-name{font-size:12px;font-weight:600;color:var(--dk)}
.fp-nut{font-size:10px;color:var(--gold);margin-top:2px}
.fp-rec-badge{font-size:9px;background:var(--sage);color:#fff;border-radius:6px;padding:1px 5px;margin-top:3px;display:inline-block}
.fp-warn{font-size:9px;color:var(--red);margin-top:2px}
.section-label{font-size:12px;font-weight:700;color:var(--mid);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.section-label .badge{background:var(--gold);color:#fff;border-radius:10px;padding:2px 8px;font-size:10px}
.section-label .badge.sage{background:var(--sage)}
.selected-meal{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;min-height:36px;padding:8px;background:#f9f4ee;border-radius:10px;border:1px dashed var(--border)}
.sel-chip{display:flex;align-items:center;gap:5px;background:var(--gold-l);border:1px solid var(--gold);border-radius:20px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer}
.sel-chip .rm{color:var(--gold);font-size:14px;line-height:1}
.sel-empty{font-size:12px;color:#bbb;align-self:center}
.meal-result{background:var(--warm);border-radius:var(--r);border:2px solid var(--gold);padding:14px;animation:fadeIn 0.3s ease;margin-top:10px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.mr-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;color:var(--dk);margin-bottom:10px}
.mr-food{display:flex;align-items:center;gap:9px;padding:8px 11px;background:#f9f4ee;border-radius:9px;margin-bottom:7px}
.mr-fname{font-weight:600;font-size:13px}.mr-portion{font-size:11px;color:var(--gold);margin-left:auto}.mr-tex{font-size:10px;color:#aaa;margin-left:7px}
.mr-nut-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:10px 0}
.mr-nut{background:#f5ede0;border-radius:8px;padding:7px 9px;font-size:11px;display:flex;justify-content:space-between}
.mr-nl{color:var(--mid)}.mr-nv{font-weight:600;color:var(--dk)}
.mr-note{font-size:11px;color:var(--peach);background:#fff8f0;border-radius:8px;padding:8px 11px;margin-top:7px;line-height:1.5}
.mr-cook{font-size:11px;color:var(--mid);font-style:italic;margin-top:8px}
.mr-week{font-size:11px;color:var(--mid);background:#f0f4ff;border-radius:8px;padding:8px 11px;margin-top:7px;line-height:1.6}
.action-btns{display:flex;gap:9px;margin-top:10px}
.btn-primary{flex:1;background:var(--gold);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Serif TC',serif}
.btn-primary:active{background:#e8a85a}
.btn-sec{flex:1;background:#f0e8d8;color:var(--mid);border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.gg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.gcard{background:var(--warm);border-radius:10px;padding:11px;border:1px solid var(--border)}
.gcn{font-size:14px;font-weight:700;color:var(--dk);margin-bottom:3px}.gctex{font-size:10px;color:var(--gold);margin-bottom:6px}
.gnr{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}.gntag{font-size:9px;background:#f0e8d8;color:var(--mid);border-radius:7px;padding:2px 6px}
.gcnote{font-size:10px;color:var(--lt);line-height:1.4}
.rb{background:#fff8f0;border:1px solid #f0d0a0;border-radius:var(--r);padding:14px}
.ri{font-size:12px;color:var(--mid);margin-bottom:8px;line-height:1.6;padding-left:14px;position:relative}
.ri::before{content:"•";position:absolute;left:0;color:var(--gold)}
.share-btn{position:fixed;bottom:18px;right:16px;background:var(--sage);color:#fff;border:none;border-radius:50px;padding:11px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Serif TC',serif;box-shadow:0 4px 16px rgba(122,158,126,0.4);z-index:200}
.share-btn:active{transform:scale(0.96)}
.share-bar{background:var(--warm);border-radius:var(--r);border:2px solid var(--sage);padding:14px;margin-top:14px;animation:fadeIn 0.3s ease}
.share-title{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700;color:var(--dk);margin-bottom:9px}
.share-text{width:100%;background:#f5ede0;border:none;border-radius:10px;padding:11px;font-family:'Noto Sans TC',sans-serif;font-size:12px;color:var(--dk);line-height:1.7;resize:none;min-height:110px}
.share-copy{width:100%;background:var(--sage);color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Serif TC',serif;margin-top:9px}
.share-copy.copied{background:#4caf50}
.share-toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:9px 18px;border-radius:18px;font-size:12px;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.share-toast.show{opacity:1}
.about-card{background:var(--warm);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.about-title{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;color:var(--dk);margin-bottom:9px}
.about-item{font-size:12px;color:var(--mid);margin-bottom:7px;line-height:1.7;padding-left:14px;position:relative}
.about-item::before{content:"→";position:absolute;left:0;color:var(--gold)}
.about-code{background:#f5ede0;border-radius:8px;padding:9px 11px;font-size:11px;font-family:monospace;color:var(--mid);margin:7px 0;line-height:1.8;word-break:break-all}
.update-btn{background:#f5ede0;color:var(--mid);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-top:7px}
/* THEME BUTTONS */
.theme-btn-row{display:flex;flex-wrap:wrap;gap:7px}
.theme-btn{background:#fff;border:1.5px solid;border-radius:20px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:'Noto Sans TC',sans-serif;font-weight:600;transition:all 0.2s;white-space:nowrap}
.theme-btn:active{opacity:0.8;transform:scale(0.97)}
/* THEME RESULT */
.theme-result-card{border-radius:var(--r);border:2px solid;padding:14px;margin-bottom:12px;animation:fadeIn 0.3s ease}
.theme-result-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.theme-result-icon{font-size:24px;flex-shrink:0}
.theme-result-title{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;color:var(--dk)}
.theme-result-desc{font-size:11px;color:var(--mid);margin-top:2px}
.theme-result-close{margin-left:auto;background:none;border:none;font-size:18px;color:#aaa;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
.theme-result-foods{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.theme-food-chip{display:flex;flex-direction:column;align-items:center;background:#fff;border-radius:10px;padding:8px 10px;font-size:13px;font-weight:600;color:var(--dk);min-width:64px;text-align:center}
.theme-food-unit{font-size:10px;color:var(--lt);font-weight:400;margin-top:2px}
.theme-result-nut{font-size:11px;color:var(--mid);padding:7px 10px;background:rgba(255,255,255,0.6);border-radius:8px;margin-bottom:7px}
.theme-result-reasons{font-size:11px;color:var(--mid);font-style:italic;line-height:1.6}
.theme-apply-note{font-size:11px;color:var(--sage);margin:6px 0 4px;font-style:italic}

/* ══ LAB STYLES ══ */
.lab-section-title{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;color:var(--dk);margin-bottom:10px}
.lab-meta-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.lab-meta-chip{font-size:11px;background:#f5ede0;color:var(--mid);border-radius:10px;padding:3px 9px}
.cat-balance-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.cat-chip{font-size:11px;border-radius:10px;padding:3px 9px;font-weight:600}
.lab-nut-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.lab-nut-label{width:55px;font-size:11px;font-weight:600;color:var(--dk);flex-shrink:0}
.lab-nut-bar-wrap{flex:1;height:11px;background:#e8e0d0;border-radius:6px;overflow:hidden}
.lab-nut-bar{height:100%;border-radius:6px;transition:width 0.5s ease}
.lab-nut-val{width:52px;font-size:11px;color:var(--dk);text-align:right;flex-shrink:0}
.lab-nut-pct{width:32px;font-size:11px;font-weight:700;text-align:right;flex-shrink:0}
.combo-tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.combo-tag{font-size:11px;border:1.5px solid;border-radius:12px;padding:3px 10px;font-weight:600}
.combo-comment{border-left:3px solid;padding:9px 11px;margin-bottom:8px;background:#fafaf8;border-radius:0 8px 8px 0}
.combo-comment-tag{font-size:11px;font-weight:700;margin-bottom:4px}
.combo-comment-text{font-size:12px;color:var(--mid);line-height:1.6}
.food-note-item{display:flex;flex-direction:column;gap:3px;padding:9px 0;border-bottom:1px solid var(--border)}
.food-note-item:last-child{border-bottom:none}
.food-note-name{font-size:13px;font-weight:700;color:var(--dk)}
.food-note-text{font-size:12px;color:var(--mid);line-height:1.6}
.lab-warnings{margin-top:10px;padding:9px 11px;background:#fff8f0;border-radius:8px;border:1px solid #f0d0a0}
.lab-warn-item{font-size:12px;color:var(--mid);margin-bottom:5px;line-height:1.5}
.lab-warn-item:last-child{margin-bottom:0}
.cook-item{display:flex;align-items:baseline;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.cook-item:last-child{border-bottom:none}
.cook-name{font-weight:700;color:var(--dk);flex-shrink:0;width:60px}
.cook-method{color:var(--mid)}

/* ══ GUIDE V2 STYLES ══ */
.guide-cards-list{display:flex;flex-direction:column;gap:12px;margin-top:4px}
.guide-card-v2{background:var(--warm);border-radius:var(--r);border:1px solid var(--border);padding:14px;box-shadow:var(--shadow)}
.guide-card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.guide-card-emoji{font-size:28px;flex-shrink:0}
.guide-card-title-area{flex:1}
.guide-card-name{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;color:var(--dk)}
.guide-card-sub{font-size:11px;color:var(--lt);margin-top:2px}
.guide-first-badge{font-size:10px;background:#e8f5e9;color:#2e7d32;border-radius:10px;padding:3px 8px;font-weight:700;flex-shrink:0}
.guide-nut-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.guide-nut-chip{font-size:10px;border-radius:8px;padding:2px 8px;font-weight:600}
.guide-nut-chip.iron{background:#fdecea;color:#c0392b}
.guide-nut-chip.ca{background:#e8f4f8;color:#1565c0}
.guide-nut-chip.pro{background:#f3e5f5;color:#6a1b9a}
.guide-nut-chip.dha{background:#e3f2fd;color:#1a6ca8}
.guide-nut-chip.vitd{background:#fff8e1;color:#f57f17}
.guide-nut-chip.vitc{background:#f9fbe7;color:#558b2f}
.guide-nut-chip.fib{background:#e8f5e9;color:#2e7d32}
.guide-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.guide-info-item{background:#f9f4ee;border-radius:8px;padding:6px 9px;display:flex;flex-direction:column;gap:2px}
.guide-info-label{font-size:10px;color:var(--lt)}
.guide-info-val{font-size:12px;font-weight:600;color:var(--dk)}
.guide-section-label{font-size:11px;font-weight:700;color:var(--mid);margin:8px 0 5px}
.guide-tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.guide-cook-tag{font-size:10px;background:#f0e8d8;color:var(--mid);border-radius:8px;padding:2px 8px}
.guide-pair-tag{font-size:10px;background:#e8f0e0;color:#4a6e3e;border-radius:8px;padding:2px 8px}
.guide-commentary{font-size:12px;color:var(--mid);line-height:1.7;background:#f9f4ee;border-radius:8px;padding:9px 11px;margin-bottom:6px}
.guide-intro-note{font-size:11px;color:var(--sage);background:#e8f5e9;border-radius:8px;padding:7px 10px;margin-top:6px;line-height:1.5}
.guide-caution{font-size:11px;color:#e07030;background:#fff8f0;border-radius:8px;padding:7px 10px;margin-top:6px;line-height:1.5}
.theme-food-name{font-size:12px;font-weight:700;color:var(--dk);margin-top:3px}
.theme-food-nut{font-size:10px;color:var(--gold);margin-top:1px}
.theme-btn-active{font-weight:700}
.swap-unit{font-size:9px;color:var(--lt);margin-top:1px}
/* SWAP PICKER */
.food-top-row{display:flex;justify-content:space-between;align-items:flex-start}
.swap-btn{background:var(--gold-l);border:1px solid var(--gold);border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:14px;color:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:4px;transition:all 0.2s}
.swap-btn:active{background:var(--gold);color:#fff}
.swap-picker{margin-top:10px;background:#f0f8f0;border-radius:10px;border:1px solid var(--sage);padding:10px;animation:fadeIn 0.2s ease}
.swap-title{font-size:11px;font-weight:700;color:var(--sage);margin-bottom:8px}
.swap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.swap-item{background:#fff;border-radius:8px;padding:7px 5px;cursor:pointer;border:1px solid var(--border);text-align:center;transition:all 0.15s}
.swap-item:active{background:var(--sage-l);border-color:var(--sage)}
.swap-emoji{font-size:18px;margin-bottom:2px}
.swap-name{font-size:11px;font-weight:600;color:var(--dk)}
.swap-nut{font-size:9px;color:var(--gold);margin-top:1px}
.swap-reason{font-size:9px;color:#5a8a5a;margin-top:2px;line-height:1.3}
.swap-warn{font-size:9px;color:#e05050;margin-top:2px;line-height:1.3}

// ██ NUTRITION ANALYSIS ENGINE ██
// ══════════════════════════════════════════════════════════════════════
function getFullNutritionAnalysis(selectedFoods) {
  if (!selectedFoods.length) return null;

  // Base nutrition calculation
  const nut = {};
  Object.keys(DAILY_TARGETS).forEach(k => nut[k] = 0);
  selectedFoods.forEach(name => {
    const f = FOODS[name]; if (!f) return;
    Object.keys(DAILY_TARGETS).forEach(k => {
      nut[k] = (nut[k]||0) + (f[k]||0) * f.p / 100;
    });
  });

  // Effective iron (considering vitC boost)
  const effectiveIron = calcEffectiveIron(selectedFoods);

  // % of daily target this meal covers
  const pctOfDaily = {};
  Object.keys(DAILY_TARGETS).forEach(k => {
    pctOfDaily[k] = Math.round(nut[k] / DAILY_TARGETS[k] * 100);
  });

  // Digest score
  const digestScore = selectedFoods.reduce((s,n) => s + (FOODS[n]?.digest||1), 0);

  // Allergen check
  const allergens = [...new Set(selectedFoods.flatMap(n => FOODS[n]?.allergen||[]))];

  // Age appropriateness (current baby is 10 months)
  const AGE_MONTHS = 10;
  const ageIssues = selectedFoods.filter(n => (FOODS_EXT[n]?.minAge||0) > AGE_MONTHS);

  // New food check
  const weeklyCount = getWeekCount();
  const newFoods = selectedFoods.filter(n => !(weeklyCount[n]));

  // Category distribution
  const catDist = {};
  selectedFoods.forEach(n => {
    const cat = FOODS[n]?.cat||"other";
    catDist[cat] = (catDist[cat]||0) + 1;
  });

  // Matching combo rules
  const matchedRules = COMBO_RULES.filter(r => r.match(selectedFoods));

  // Identify dominant nutrient
  const nutEntries = Object.entries(pctOfDaily)
    .filter(([k]) => ["iron","calcium","protein","dha","vitD","vitC","fiber"].includes(k))
    .sort((a,b) => b[1]-a[1]);

  return {
    nut, effectiveIron, pctOfDaily,
    digestScore,
    allergens,
    ageIssues,
    newFoods,
    catDist,
    matchedRules,
    dominantNutrients: nutEntries.slice(0,3).map(([k]) => k),
  };
}

  Object.keys(DAILY_TARGETS).forEach(k=>{const total=(m[k]||0)+(fd[k]||0),target=DAILY_TARGETS[k]*7,pct=Math.min(100,total/target*100);res.push({key:k,pct:Math.round(pct),deficit:target-total});});
  return res.sort((a,b)=>a.pct-b.pct);
}
function calcEffectiveIron(sel){
  let tot=0;
  const hasVitC=sel.some(n=>{const f=FOODS[n];return f&&(f.vitC_boost||(f.vitC||0)>=15);});
  sel.forEach(n=>{const f=FOODS[n];if(!f)return;const raw=(f.iron||0)*f.p/100;const rate=f.absorb==="heme"?0.25:(hasVitC?0.08*3:0.08);tot+=raw*rate;});
  return tot;
}

}

// ── 動態推薦引擎（整週視角） ─────────────────────────────────────────
function getRecommendations(sel, filterCat){
  const deficits=getDeficits();
  const top3=deficits.slice(0,3).map(d=>d.key);
  const top5=deficits.slice(0,5).map(d=>d.key);
  const wc=getWeekCount();
  const selCats=sel.map(n=>FOODS[n]?.cat).filter(Boolean);
  const catCount={};selCats.forEach(c=>catCount[c]=(catCount[c]||0)+1);
  const usedDigest=sel.reduce((s,n)=>s+(FOODS[n]?.digest||1),0);
  const {remainDays,todayMealsLeft,totalMealsLeft}=getWeekRemainingCapacity();

  // 計算本週各營養素每餐平均需補充量
  const m=getMilkBase(),fd=getFoodTotal();
  const nutUrgency={};
  Object.keys(DAILY_TARGETS).forEach(k=>{
    const target=DAILY_TARGETS[k]*7;
    const current=(m[k]||0)+(fd[k]||0);
    const deficit=Math.max(0,target-current);
    // 每餐平均需補充量
    nutUrgency[k]=totalMealsLeft>0?deficit/totalMealsLeft:0;
  });

  const scores={};
  Object.entries(FOODS).forEach(([name,f])=>{
    if(sel.includes(name))return;
    const catUsed=catCount[f.cat]||0,catMax=MEAL_SLOTS[f.cat]?.max||1;
    if(catUsed>=catMax)return;
    if(usedDigest+f.digest>MAX_DIGEST)return;
    // If replacing a specific slot, only show foods of same category
    if(filterCat&&f.cat!==filterCat)return;

    let score=50;const reasons=[];

    // ① 緊迫營養素補充（基於整週剩餘計算，最高權重）
    top5.forEach((nut,i)=>{
      const val=(f[nut]||0)*f.p/100;
      const urgency=nutUrgency[nut]||0;
      if(val>0&&urgency>0){
        const urgencyBonus=Math.min(40,Math.round(val/urgency*20));
        score+=Math.max(5,35-i*5)+urgencyBonus;
        if(i<3) reasons.push(`補本週缺乏的${NUT_LABEL[nut]}`);
      }
    });

    // ② 鐵質吸收協同邏輯（科學配搭核心）
    const hasHemeIron=sel.some(n=>FOODS[n]?.absorb==="heme");
    const hasNonHemeIron=sel.some(n=>FOODS[n]?.absorb==="non-heme"&&(FOODS[n]?.iron||0)>1);
    // 有補鐵食材→推薦維C
    if((hasHemeIron||hasNonHemeIron)&&f.vitC_boost){
      score+=30;reasons.push("維C促進鐵質吸收（效果×3）");
    }
    // 有維C食材→推薦鐵質食材
    const hasVitCFood=sel.some(n=>FOODS[n]?.vitC_boost||(FOODS[n]?.vitC||0)>=15);
    if(hasVitCFood&&f.absorb==="heme"){
      score+=25;reasons.push("配合維C，動物性鐵吸收率達25%");
    }
    if(hasVitCFood&&f.absorb==="non-heme"&&(f.iron||0)>1.5){
      score+=20;reasons.push("配合維C，植物性鐵吸收率提升3倍");
    }
    // 尚未有任何補鐵食材→強力推薦
    if(!hasHemeIron&&!hasNonHemeIron&&f.absorb==="heme"&&top3.includes("iron")){
      score+=25;reasons.push("本週鐵質不足，優先補充動物性鐵");
    }

    // ③ 本週重複率懲罰（整週視角）
    const weeklyUse=wc[name]||0;
    if(weeklyUse===1) score-=10;
    else if(weeklyUse===2) score-=25;
    else if(weeklyUse>=3) score-=45;

    // ④ 天然配搭加分
    sel.forEach(sn=>{
      if(FOODS[sn]?.pairs?.includes(name)){score+=12;reasons.push(`與${sn}天然配搭`);}
    });

    // ⑤ 消化友善加分
    score+=(5-f.digest)*4;

    // ⑥ 類別必要性（確保每餐結構完整）
    if(MEAL_SLOTS[f.cat]?.required&&catUsed===0){
      score+=25;reasons.push(`補充必要的${MEAL_SLOTS[f.cat]?.label||f.cat}`);
    }

    // ⑦ 本週完全未嘗試的食材加分
    if(weeklyUse===0){score+=8;reasons.push("本週未曾進食，增加多樣性");}

    // ⑧ 今日剩餘餐次調整（今日最後一餐→優先補本日缺口）
    if(todayMealsLeft===1){
      // 今日最後一餐，重點補充今日還沒攝取的類別
      if(catUsed===0&&MEAL_SLOTS[f.cat]?.required) score+=15;
    }

    // ⑨ 週末補充策略（本週最後兩天→加大緊迫值）
    if(remainDays<=1&&top3.includes("iron")&&f.absorb==="heme"){
      score+=15;reasons.push("本週最後兩天，優先補充缺口");
    }

    // ⑩ 避免同餐衝突（草酸、鈣鐵競爭等）
    let conflict=false;
    sel.forEach(sn=>{if(FOODS[sn]?.avoid?.some(a=>a.includes(name)))conflict=true;});
    if(conflict){score-=45;reasons.push("⚠️ 此組合有吸收衝突");}

    // 過敏原提示（不扣分，只加入原因提示）
    if(f.allergen?.length>0) reasons.push(`⚠️ 含${f.allergen.join("/")}過敏原`);

    scores[name]={score,reasons:[...new Set(reasons)],food:f};
  });

  return Object.entries(scores)
    .filter(([,v])=>v.score>0)
    .sort((a,b)=>b[1].score-a[1].score)
    .slice(0,12)
    .map(([name,v])=>({name,...v}));
}

function getMealAnalysis(sel){
  if(!sel.length)return null;
  const mn={};Object.keys(DAILY_TARGETS).forEach(k=>mn[k]=0);
  sel.forEach(name=>{const f=FOODS[name];if(!f)return;Object.keys(DAILY_TARGETS).forEach(k=>{mn[k]=(mn[k]||0)+(f[k]||0)*f.p/100;});});
  const ei=calcEffectiveIron(sel);
  const warnings=[];
  if(sel.some(n=>FOODS[n]?.absorb==="heme"))warnings.push("⚠️ 補鐵餐：餐前後1小時勿餵奶");
  if(sel.includes("豬肝"))warnings.push("⚠️ 豬肝每週不超過2次（20g/次）");
  const ds=sel.reduce((s,n)=>s+(FOODS[n]?.digest||1),0);
  return{mn,ei,warnings,ds};
}

// ── 一鍵主題配對引擎 ─────────────────────────────────────────────────
function generateThemeMeal(themeKey){
  const theme=MEAL_THEMES[themeKey];
  if(!theme) return null;
  const wc=getWeekCount();
  const deficits=getDeficits();

  // Score all foods by theme weights
  function scoreFood(name){
    const f=FOODS[name]; if(!f) return -99;
    let score=0;
    // Apply theme weights
    Object.entries(theme.weights).forEach(([k,w])=>{
      if(k==="heme") score+=(f.absorb==="heme"?1:0)*w*10;
      else if(k==="vitC_boost") score+=(f.vitC_boost?1:0)*w*10;
      else score+=(f[k]||0)*f.p/100*w;
    });
    // Week repetition penalty
    score-=(wc[name]||0)*8;
    // Week deficit bonus
    deficits.slice(0,3).forEach((d,i)=>{
      const val=(f[d.key]||0)*f.p/100;
      if(val>0) score+=(3-i)*3;
    });
    // Digest score bonus (easier = better)
    score+=(5-f.digest)*3;
    return score;
  }

  const result={protein:null,veg:[],carb:null,fruit:null};

  // Pick best protein
  const proteins=Object.entries(FOODS)
    .filter(([,f])=>f.cat==="protein")
    .map(([name])=>({name,score:scoreFood(name)}))
    .sort((a,b)=>b.score-a.score);
  result.protein=proteins[0]?.name;

  // Pick best veg(s) - up to 2, considering vitC boost if needed
  const vegs=Object.entries(FOODS)
    .filter(([,f])=>f.cat==="veg")
    .map(([name])=>({name,score:scoreFood(name)+(theme.vitCBoost&&FOODS[name].vitC_boost?20:0)}))
    .sort((a,b)=>b.score-a.score);
  result.veg=[vegs[0]?.name, vegs[1]?.name].filter(Boolean).slice(0,1);

  // Pick best carb
  const carbs=Object.entries(FOODS)
    .filter(([,f])=>f.cat==="carb")
    .map(([name])=>({name,score:scoreFood(name)}))
    .sort((a,b)=>b.score-a.score);
  result.carb=carbs[0]?.name;

  // Pick best fruit (consider vitC if theme needs it)
  const fruits=Object.entries(FOODS)
    .filter(([,f])=>f.cat==="fruit")
    .map(([name])=>({name,score:scoreFood(name)+(theme.vitCBoost&&FOODS[name].vitC_boost?25:0)}))
    .sort((a,b)=>b.score-a.score);
  result.fruit=fruits[0]?.name;

  const allFoods=[result.protein,...result.veg,result.carb,result.fruit].filter(Boolean);

  // Calculate effective iron with this combination
  const ei=calcEffectiveIron(allFoods);

  // Calculate total nutrients
  const nut={};
  allFoods.forEach(name=>{
    const f=FOODS[name]; if(!f) return;
    ["iron","calcium","protein","dha","vitD","vitC","fiber"].forEach(k=>{
      nut[k]=(nut[k]||0)+(f[k]||0)*f.p/100;
    });
  });

  // Generate explanation
  const reasons=[];
  if(themeKey==="補鐵"&&result.protein){
    const pf=FOODS[result.protein];
    reasons.push(pf.absorb==="heme"?`${result.protein}提供動物性鐵，吸收率達25%`:`${result.protein}提供植物性鐵`);
    const hasVitC=allFoods.some(n=>FOODS[n]?.vitC_boost);
    if(hasVitC) reasons.push("配搭維C食材，鐵吸收效率提升3倍");
  }
  if(themeKey==="補DHA"&&result.protein) reasons.push(`${result.protein}每份提供DHA ${((FOODS[result.protein]?.dha||0)*FOODS[result.protein]?.p/100).toFixed(0)}mg`);
  if(themeKey==="補鈣") reasons.push(`此餐鈣質合計約${nut.calcium?.toFixed(0)||0}mg`);

  return{theme, themeKey, foods:allFoods, nut, ei, reasons};
}

function getMealNutSummary(foods){
  if(!foods||!foods.length) return"";
  const nut={iron:0,vitC:0,calcium:0,dha:0};
  foods.forEach(name=>{const f=FOODS[name];if(!f)return;Object.keys(nut).forEach(k=>{nut[k]+=(f[k]||0)*f.p/100;});});
  const ei=calcEffectiveIron(foods);
  const parts=["🩸 鐵 "+nut.iron.toFixed(1)+"mg","有效吸收 "+ei.toFixed(1)+"mg"];
  if(nut.vitC>0) parts.push("🍋 維C "+nut.vitC.toFixed(0)+"mg");
  if(nut.calcium>0) parts.push("🦴 鈣 "+nut.calcium.toFixed(0)+"mg");
  if(nut.dha>0) parts.push("🐟 DHA "+nut.dha.toFixed(0)+"mg");
  return'<div class="meal-nut-bar">'+parts.map(p=>'<span>'+p+'</span>').join("")+'</div>';
}

  // ── Nutrition analysis panel ───────────────────────────────────
  let analysisPanel = "";
  if (analysis) {
    const {nut, effectiveIron, pctOfDaily, digestScore, allergens, ageIssues, newFoods, catDist, matchedRules, dominantNutrients} = analysis;

    // Nutrient bars
    const nutBars = [
      {k:"iron",   l:"鐵質",   u:"mg",  max:10},
      {k:"calcium",l:"鈣質",   u:"mg",  max:260},
      {k:"protein",l:"蛋白質", u:"g",   max:11},
      {k:"dha",    l:"DHA",    u:"mg",  max:100},
      {k:"vitD",   l:"維D",    u:"mcg", max:10},
      {k:"vitC",   l:"維C",    u:"mg",  max:50},
      {k:"fiber",  l:"纖維",   u:"g",   max:5},
    ].map(n => {
      const val = nut[n.k]||0;
      const pct = Math.min(100, val/n.max*100);
      const c = pct>=60?"#4caf50":pct>=30?"#ff9800":"#bbb";
      return `<div class="lab-nut-row">
        <div class="lab-nut-label">${n.l}</div>
        <div class="lab-nut-bar-wrap"><div class="lab-nut-bar" style="width:${pct}%;background:${c}"></div></div>
        <div class="lab-nut-val">${val.toFixed(1)}${n.u}</div>
        <div class="lab-nut-pct" style="color:${c}">${Math.round(pct)}%</div>
      </div>`;
    }).join("");

    // Effective iron row
    const eiPct = Math.min(100, effectiveIron/10*100);
    const eiColor = eiPct>=30?"#4caf50":eiPct>=15?"#ff9800":"#bbb";
    const eiBar = `<div class="lab-nut-row" style="border-top:1px dashed var(--border);padding-top:8px;margin-top:4px">
      <div class="lab-nut-label" style="font-size:10px">有效鐵<br>吸收</div>
      <div class="lab-nut-bar-wrap"><div class="lab-nut-bar" style="width:${eiPct}%;background:${eiColor}"></div></div>
      <div class="lab-nut-val">${effectiveIron.toFixed(2)}mg</div>
      <div class="lab-nut-pct" style="color:${eiColor}">${Math.round(eiPct)}%</div>
    </div>`;

    // Category balance
    const catLabels = {protein:"蛋白質",veg:"蔬菜",carb:"主食",fruit:"水果",fat:"脂肪"};
    const catBalance = Object.entries(catLabels).map(([cat,label]) => {
      const count = catDist[cat]||0;
      const needed = cat==="protein"||cat==="veg"||cat==="carb";
      const ok = count > 0;
      return `<span class="cat-chip" style="background:${ok?"#e8f5e9":"#fdecea"};color:${ok?"#2e7d32":"#c0392b"}">${ok?"✓":"○"} ${label}</span>`;
    }).join("");

    // Matched combo tags
    const comboTags = matchedRules.map(r =>
      `<div class="combo-tag" style="border-color:${r.color};color:${r.color}">${r.tag}</div>`
    ).join("");

    // Combo commentaries
    const commentaries = matchedRules.map(r =>
      `<div class="combo-comment" style="border-left-color:${r.color}">
        <div class="combo-comment-tag" style="color:${r.color}">${r.tag}</div>
        <div class="combo-comment-text">${r.commentary(sel)}</div>
      </div>`
    ).join("");

    // Individual food notes
    const foodNotes = sel.map(name => {
      const ext = FOODS_EXT[name];
      if (!ext) return "";
      const comment = ext.commentary?.solo || "";
      return comment ? `<div class="food-note-item">
        <span class="food-note-name">${FOODS[name]?.emoji||""} ${name}</span>
        <span class="food-note-text">${comment}</span>
      </div>` : "";
    }).filter(Boolean).join("");

    // Warnings
    const warnings = [];
    if (allergens.length) warnings.push(`⚠️ 過敏原：${allergens.join("、")}`);
    if (ageIssues.length) warnings.push(`⚠️ ${ageIssues.join("、")} 建議引入月齡較大`);
    if (newFoods.length) warnings.push(`🆕 新食材：${newFoods.join("、")}，引入後觀察3-5天`);
    const digestLabel = digestScore<=3?"輕鬆":digestScore<=5?"適中":digestScore<=7?"偏重":"較重";
    const digestColor = digestScore<=3?"#4caf50":digestScore<=5?"#ff9800":digestScore<=7?"#f57c00":"#e05050";

    analysisPanel = `
    <div class="card" style="margin-top:4px">
      <div class="lab-section-title">📊 營養分析</div>
      <div class="lab-meta-row">
        <span class="lab-meta-chip">食材數: ${sel.length}種</span>
        <span class="lab-meta-chip" style="color:${digestColor}">消化負擔: ${digestLabel}</span>
        ${allergens.length?`<span class="lab-meta-chip" style="color:#e07030">過敏原: ${allergens.join("/")} </span>`:""}
      </div>
      <div class="cat-balance-row">${catBalance}</div>
      ${nutBars}${eiBar}
    </div>

    ${matchedRules.length?`<div class="card">
      <div class="lab-section-title">🏷️ 組合特徵</div>
      <div class="combo-tags-row">${comboTags}</div>
      ${commentaries}
    </div>`:""}

    <div class="card">
      <div class="lab-section-title">📝 食材評論</div>
      ${foodNotes || `<div style="font-size:12px;color:#bbb">選擇食材後顯示評論</div>`}
      ${warnings.length?`<div class="lab-warnings">${warnings.map(w=>`<div class="lab-warn-item">${w}</div>`).join("")}</div>`:""}
    </div>

    <div class="card">
      <div class="lab-section-title">💡 烹調建議</div>
      ${sel.map(name=>{
        const ext=FOODS_EXT[name];
        if(!ext?.cookMethods?.length) return "";
        return `<div class="cook-item"><span class="cook-name">${name}</span><span class="cook-method">${ext.cookMethods.join(" / ")}</span></div>`;
      }).filter(Boolean).join("")||`<div style="font-size:12px;color:#bbb">選擇食材後顯示</div>`}
    </div>

    <div class="action-btns">
      <button class="btn-primary" id="lab-apply-1">套用到今日第一餐</button>
      <button class="btn-sec" id="lab-apply-2">套用到第二餐</button>
    </div>`;
  }

  return `<div class="st">配搭實驗室</div>
    <div class="ss">自由選擇食材 → 即時營養分析 → 查看配搭評論 → 套用到餐單</div>

    <div class="card">
      <div class="section-label">✅ 已選食材（最多5種）</div>
      <div class="selected-meal">${selChips}</div>
      ${sel.length?`<button class="btn-sec" id="clear-sel" style="width:100%;margin-top:6px">清空重選</button>`:""}
    </div>

    ${analysisPanel}

    <div class="card">
      <div class="section-label">🔍 選擇食材 ${sel.length>0?`<span class="badge sage">綠色=與已選最匹配</span>`:""}</div>
      <div class="day-tabs" style="margin-bottom:10px">${filterBtns}</div>
      <div class="food-picker-grid">${foodGrid}</div>
    </div>`;
}

function bind(){
  document.querySelectorAll(".nb").forEach(b=>b.addEventListener("click",()=>{S.tab=b.dataset.tab;document.querySelectorAll(".nb").forEach(x=>x.classList.remove("active"));b.classList.add("active");render();}));
  document.querySelectorAll("[data-day]").forEach(b=>b.addEventListener("click",()=>{S.day=parseInt(b.dataset.day);render();}));
  document.querySelectorAll("[data-t]").forEach(el=>el.addEventListener("click",()=>{const[d,m,food]=el.dataset.t.split("|");const key=`${d}-${m}`,cur=S.log[key]||[];S.log[key]=cur.includes(food)?cur.filter(f=>f!==food):[...cur,food];saveState();render();}));
  const ni=document.getElementById("ni");if(ni)ni.addEventListener("input",e=>{S.notes[S.day]=e.target.value;saveState();});
  document.querySelectorAll("[data-filter]").forEach(b=>b.addEventListener("click",()=>{S.dynFilter=b.dataset.filter;render();}));
  document.querySelectorAll("[data-pick]").forEach(el=>el.addEventListener("click",()=>{const name=el.dataset.pick;if(!S.dynSel.includes(name)&&S.dynSel.length<5){S.dynSel=[...S.dynSel,name];render();}}));
  document.querySelectorAll("[data-remove]").forEach(el=>el.addEventListener("click",()=>{S.dynSel=S.dynSel.filter(n=>n!==el.dataset.remove);render();}));
  const cm=document.getElementById("confirm-meal");
  if(cm)cm.addEventListener("click",()=>{if(!S.dynSel.length)return;const d=S.day;const s0=S.log[`${d}-0`]||[],s1=S.log[`${d}-1`]||[];const slot=s0.length===0?"0":"1";S.log[`${d}-${slot}`]=[...new Set([...(S.log[`${d}-${slot}`]||[]),...S.dynSel])];S.dynSel=[];saveState();alert("✅ 已記錄到今日餐單！");S.tab="weekly";render();});
  const cl=document.getElementById("clear-sel");if(cl)cl.addEventListener("click",()=>{S.dynSel=[];render();});
  document.getElementById("share-fab")?.addEventListener("click",showSharePanel);
  document.getElementById("export-btn")?.addEventListener("click",()=>{const b=new Blob([JSON.stringify({log:S.log,notes:S.notes,customMeals:S.customMeals},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="魚魚記錄備份.json";a.click();});

  // ── Theme buttons ─────────────────────────────────────────────────
  document.querySelectorAll("[data-theme]").forEach(btn=>btn.addEventListener("click",()=>{
    const key=btn.dataset.theme;
    S.themeResult=S.themeResult?.themeKey===key?null:generateThemeMeal(key);
    render();
  }));

  // ── Close theme result ────────────────────────────────────────────
  document.querySelectorAll("[data-close-theme]").forEach(btn=>btn.addEventListener("click",()=>{
    S.themeResult=null; render();
  }));

  // ── Guide filter ─────────────────────────────────────────────────
  document.querySelectorAll("[data-gfilter]").forEach(b=>b.addEventListener("click",()=>{
    S.guideFilter=b.dataset.gfilter; render();
  }));

  // ── Lab: apply to meal ────────────────────────────────────────────
  document.getElementById("lab-apply-1")?.addEventListener("click",()=>{
    if(!S.dynSel.length) return;
    const key=`${S.day}-0`;
    S.customMeals[key]=[...S.dynSel];
    S.log[key]=[];
    S.dynSel=[];
    saveState(); S.tab="weekly"; render();
  });
  document.getElementById("lab-apply-2")?.addEventListener("click",()=>{
    if(!S.dynSel.length) return;
    const key=`${S.day}-1`;
    S.customMeals[key]=[...S.dynSel];
    S.log[key]=[];
    S.dynSel=[];
    saveState(); S.tab="weekly"; render();
  });

  // ── Apply theme to meal slot ─────────────────────────────────────
  document.querySelectorAll("[data-apply-theme]").forEach(btn=>btn.addEventListener("click",()=>{
    if(!S.themeResult) return;
    const mi=parseInt(btn.dataset.applyTheme); // 0 or 1
    const d=S.day, key=`${d}-${mi}`;
    S.customMeals[key]=[...S.themeResult.foods];
    S.log[key]=[];
    S.themeResult=null;
    saveState(); render();
  }));

  // ── Swap button: open picker ──────────────────────────────────────
  document.querySelectorAll("[data-edit]").forEach(btn=>btn.addEventListener("click",e=>{
    e.stopPropagation();
    const key=btn.dataset.edit;
    S.editingSlot=S.editingSlot===key?null:key;
    render();
  }));

  // ── Swap item: apply replacement ──────────────────────────────────
  document.querySelectorAll("[data-swap]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const[d,mi,si,newFood]=el.dataset.swap.split("|");
    const mealKey=`${d}-${mi}`;
    const origFoods=MENU[parseInt(d)].meals[parseInt(mi)].foods;
    const current=S.customMeals[mealKey]?[...S.customMeals[mealKey]]:[...origFoods];
    current[parseInt(si)]=newFood;
    S.customMeals[mealKey]=current;
    // Also update eaten log: remove old food, keep new one unset
    const oldFood=origFoods[parseInt(si)];
    if(S.log[mealKey]){S.log[mealKey]=S.log[mealKey].filter(f=>f!==oldFood);}
    S.editingSlot=null;
    saveState();render();
  }));

  // ── Cancel swap ───────────────────────────────────────────────────
  document.querySelectorAll("[data-cancel]").forEach(btn=>btn.addEventListener("click",e=>{
    e.stopPropagation();S.editingSlot=null;render();
  }));
}

function showSharePanel(){
  if(S.tab!=="weekly"){S.tab="weekly";document.querySelectorAll(".nb").forEach(b=>b.classList.toggle("active",b.dataset.tab==="weekly"));render();}
  const ex=document.getElementById("share-panel");if(ex){ex.remove();return;}
  const d=S.day,dn=["星期一","星期二","星期三","星期四","星期五","星期六","星期日"],dt=new Date().toLocaleDateString("zh-HK",{month:"numeric",day:"numeric"});
  let lines=[`🐟 魚魚副食品記錄 ${dt}（${dn[d]}）`,""];
  MENU[d].meals.forEach((meal,mi)=>{const eaten=S.log[`${d}-${mi}`]||[];lines.push(`【${mi===0?"第一餐":"第二餐"}】${meal.name}`);meal.foods.forEach(food=>lines.push(`  ${eaten.includes(food)?"✅":"⬜"} ${food}`));if(eaten.length===meal.foods.length)lines.push("  🎉 全部完成！");lines.push("");});
  const note=S.notes[d];if(note?.trim()){lines.push("📝 備註："+note.trim());lines.push("");}
  const allE=[...(S.log[`${d}-0`]||[]),...(S.log[`${d}-1`]||[])];
  if(allE.some(f=>FOODS[f]?.absorb==="heme"))lines.push("⚠️ 今日有補鐵餐，記得餐前後1小時勿餵奶");
  lines.push("──────────────\n魚魚副食品工具 🐟");
  const panel=document.createElement("div");panel.id="share-panel";panel.className="share-bar";
  panel.innerHTML=`<div class="share-title">📤 今日記錄 — 複製後貼到群組</div><textarea class="share-text" id="share-ta" readonly>${lines.join("\n")}</textarea><button class="share-copy" id="share-copy-btn">複製文字</button>`;
  document.getElementById("mc").appendChild(panel);panel.scrollIntoView({behavior:"smooth",block:"end"});
  document.getElementById("share-copy-btn").addEventListener("click",()=>{const ta=document.getElementById("share-ta");if(navigator.clipboard)navigator.clipboard.writeText(ta.value).then(showToast);else{ta.select();document.execCommand("copy");showToast();}document.getElementById("share-copy-btn").textContent="已複製 ✓";document.getElementById("share-copy-btn").classList.add("copied");});
}
function showToast(){const t=document.getElementById("share-toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
render();
</script>
</body>
</html>
